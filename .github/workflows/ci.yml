name: CI - Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-coverage:
    name: Unit Tests & Coverage (100% Required)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run unit tests with coverage
      run: |
        pytest --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=100 -v
      
    - name: Verify 100% test pass rate
      run: |
        # Pytest will fail if any test fails, ensuring 100% pass rate
        echo "✅ All tests passed (100% pass rate)"
    
    - name: Enforce 100% coverage gate
      run: |
        # pytest --cov-fail-under=100 already enforces this, but let's verify
        coverage report --fail-under=100
        echo "✅ 100% code coverage achieved"
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-omninode
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Store coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  security-audit:
    name: Security - pip-audit (Zero Vulnerabilities)
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pip-audit
    
    - name: Run pip-audit (fail on any vulnerability)
      run: |
        pip-audit --strict --desc --skip-editable
        echo "✅ Zero vulnerabilities found"

  trivy-scan:
    name: Security - Trivy Filesystem Scan (Zero Vulnerabilities)
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '1'  # Fail on any vulnerability
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Trivy with table output
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '1'

  quality-gate-summary:
    name: ✅ All Quality Gates Passed
    runs-on: ubuntu-latest
    needs: [test-and-coverage, security-audit, trivy-scan]
    
    steps:
    - name: Quality gates summary
      run: |
        echo "════════════════════════════════════════════════"
        echo "✅ All Quality Gates PASSED"
        echo "════════════════════════════════════════════════"
        echo "✓ Unit Tests: 100% pass rate"
        echo "✓ Code Coverage: 100%"
        echo "✓ pip-audit: Zero vulnerabilities"
        echo "✓ Trivy Scan: Zero vulnerabilities"
        echo "════════════════════════════════════════════════"
