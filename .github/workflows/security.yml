name: Security Scanning

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  pip-audit:
    name: pip-audit (Zero Vulnerabilities)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pip-audit
    
    - name: Run pip-audit (fail on any vulnerability)
      run: |
        pip-audit --strict --desc --skip-editable
        echo "✅ Zero vulnerabilities found in dependencies"

  trivy-scan:
    name: Trivy Filesystem Scan (Zero Vulnerabilities)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '1'
    
    - name: Upload Trivy results to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Trivy summary
      if: success()
      run: |
        echo "✅ Zero vulnerabilities found in filesystem scan"

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [pip-audit, trivy-scan]
    if: always()
    
    steps:
    - name: Check security status
      run: |
        echo "════════════════════════════════════════════════"
        echo "🔒 SECURITY SCAN RESULTS"
        echo "════════════════════════════════════════════════"
        echo "pip-audit: ${{ needs.pip-audit.result }}"
        echo "Trivy Scan: ${{ needs.trivy-scan.result }}"
        echo "════════════════════════════════════════════════"
        
        if [ "${{ needs.pip-audit.result }}" == "success" ] && [ "${{ needs.trivy-scan.result }}" == "success" ]; then
          echo "✅ All security scans passed - Zero vulnerabilities"
          exit 0
        else
          echo "❌ Security scan failures detected"
          exit 1
        fi
