name: Publish to TestPyPI

on:
  workflow_run:
    workflows: ["Unit Tests", "Security Scanning"]
    types:
      - completed
    branches:
      - main
      - master
      - develop

jobs:
  check-ci-success:
    name: Verify Prerequisites Passed
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Prerequisites verification
      run: |
        echo "✅ Unit Tests and Security Scans completed successfully"
        echo "Proceeding with TestPyPI publication..."

  publish-testpypi:
    name: Build & Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: check-ci-success
    permissions:
      id-token: write  # Required for trusted publishing
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get all history for proper versioning
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Verify quality gates passed
      run: |
        echo "════════════════════════════════════════════════"
        echo "✅ Quality Gates Summary:"
        echo "   - Unit Tests: 100% passed"
        echo "   - Coverage: 100%"
        echo "   - pip-audit: Zero vulnerabilities"
        echo "   - Trivy scan: Zero vulnerabilities"
        echo "════════════════════════════════════════════════"
    
    - name: Extract version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(grep -E '^version = ' pyproject.toml | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Package version: $VERSION"
    
    - name: Build package
      run: |
        python -m build
        echo "✅ Package built successfully"
    
    - name: Check package with twine
      run: |
        twine check dist/*
        echo "✅ Package validation passed"
    
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true
        verbose: true
    
    - name: Publication summary
      run: |
        echo "════════════════════════════════════════════════"
        echo "✅ Successfully published to TestPyPI"
        echo "════════════════════════════════════════════════"
        echo "Version: ${{ steps.get_version.outputs.version }}"
        echo "Install with:"
        echo "pip install --index-url https://test.pypi.org/simple/ omninode==${{ steps.get_version.outputs.version }}"
        echo "════════════════════════════════════════════════"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-testpypi-${{ steps.get_version.outputs.version }}
        path: dist/
